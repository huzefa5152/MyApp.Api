name: Deploy to MonsterASP.NET

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build React Frontend
        working-directory: myapp-frontend
        run: |
          npm ci
          npm run build

      - name: Copy frontend build to wwwroot
        run: |
          mkdir -p wwwroot
          cp -r myapp-frontend/dist/* wwwroot/

      - name: Publish .NET API
        run: dotnet publish MyApp.Api.csproj -c Release -o ./publish

      - name: Copy frontend wwwroot into publish
        run: |
          mkdir -p ./publish/wwwroot
          cp -r wwwroot/* ./publish/wwwroot/

      - name: Take app offline (prevent IIS file locks)
        run: |
          echo "App is being updated..." > app_offline.htm
          curl -s --ftp-create-dirs -T app_offline.htm \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://site61833.siteasp.net/wwwroot/app_offline.htm"
          sleep 5

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: site61833.siteasp.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./publish/
          server-dir: /wwwroot/
          dangerous-clean-slate: false

      - name: Bring app back online
        if: always()
        run: |
          curl -s -Q "-DELE /wwwroot/app_offline.htm" \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" \
            "ftp://site61833.siteasp.net/"
